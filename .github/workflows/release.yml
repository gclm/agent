name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v0.1.0，需要与 private repo 的 tauri.conf.json 一致）'
        required: true
        type: string
      draft:
        description: '创建草稿 Release（手动确认发布）'
        required: false
        type: boolean
        default: true
  repository_dispatch:
    types: [release]

# 只允许单个发布任务同时跑
concurrency:
  group: release
  cancel-in-progress: false

env:
  SOURCE_REPO: gclm/gclm-agent
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────
  # macOS: universal binary (aarch64 + x86_64)
  # ────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build universal binary
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          projectPath: './desktop'
          args: '--target universal-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  # ────────────────────────────────────────────
  # Windows: x86_64 NSIS installer
  # ────────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build NSIS installer
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          projectPath: './desktop'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

  # ────────────────────────────────────────────
  # Create GitHub Release
  # ────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Gclm Agent ${{ steps.version.outputs.version }}
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos/**/*.dmg
            artifacts/macos/**/*.tar.gz
            artifacts/macos/**/*.sig
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
