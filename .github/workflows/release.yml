name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v0.1.0，需与源码版本一致）'
        required: true
        type: string
      draft:
        description: '创建草稿 Release（手动确认发布）'
        required: false
        type: boolean
        default: true
  repository_dispatch:
    types: [release]

concurrency:
  group: release
  cancel-in-progress: false

env:
  SOURCE_REPO: ${{ vars.SOURCE_REPO }}
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────
  # Preflight: cargo check + clippy + test on all 3 platforms.
  # 编译/质量/测试任一失败几分钟内挡掉，且三平台 matrix 能抓到单平台
  # 看不见的 cfg 分支错误（正是 build_shell_command 签名 bug 的根源）。
  # ────────────────────────────────────────────
  preflight:
    name: Preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      # 排除 gclm-desktop（Tauri GUI，需平台系统依赖）；engine crates 纯 Rust，
      # 三平台一致且覆盖 shell.rs 的 cfg 分支。clippy 不带 --all-targets，
      # 避免测试代码的 unwrap_used（engine-state lib.rs deny）噪音阻断。
      - name: cargo check
        run: cargo check --workspace --exclude gclm-desktop

      - name: cargo clippy
        run: cargo clippy --workspace --exclude gclm-desktop -- -D warnings

      - name: cargo test
        run: cargo test --workspace --exclude gclm-desktop

  # ────────────────────────────────────────────
  # macOS x64 (Intel)
  # ────────────────────────────────────────────
  build-macos-x64:
    name: macOS x64
    needs: preflight
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build macOS x64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          args: '--target x86_64-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64
          path: |
            target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            target/x86_64-apple-darwin/release/bundle/dmg/*.sig

  # ───────────────────────────────────────────
  # macOS ARM (Apple Silicon)
  # ────────────────────────────────────────────
  build-macos-arm:
    name: macOS ARM
    needs: preflight
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build macOS ARM
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          args: '--target aarch64-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm
          path: |
            target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            target/aarch64-apple-darwin/release/bundle/dmg/*.sig

  # ────────────────────────────────────────────
  # Windows x64
  # ────────────────────────────────────────────
  build-windows:
    name: Windows x64
    needs: preflight
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig

  # ────────────────────────────────────────────
  # Linux x64 + ARM64 (deb + AppImage)
  # 两架构都用原生 runner（ubuntu-22.04 / ubuntu-22.04-arm）native 编译，
  # bundle 都在 target/release/bundle/，靠 artifact 名区分架构。
  # ────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.arch }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            artifact: linux-x64
          - arch: arm64
            runner: ubuntu-22.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build Linux
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.sig

  # ────────────────────────────────────────────
  # Create Release + latest.json
  # ────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-x64, build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: macos-x64
          path: artifacts/macos-x64

      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v7
        with:
          name: macos-arm
          path: artifacts/macos-arm

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: windows
          path: artifacts/windows

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: linux-x64
          path: artifacts/linux-x64

      - name: Download Linux ARM64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: linux-arm64
          path: artifacts/linux-arm64

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_clean=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Gclm Agent ${{ steps.version.outputs.version }}
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-x64/**/*.dmg
            artifacts/macos-x64/**/*.sig
            artifacts/macos-arm/**/*.dmg
            artifacts/macos-arm/**/*.sig
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.sig
            artifacts/linux-x64/**/*.deb
            artifacts/linux-x64/**/*.AppImage
            artifacts/linux-x64/**/*.sig
            artifacts/linux-arm64/**/*.deb
            artifacts/linux-arm64/**/*.AppImage
            artifacts/linux-arm64/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version_clean }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}"

          # 读取签名文件内容
          MACOS_X64_SIG=$(cat artifacts/macos-x64/*.sig 2>/dev/null | head -1 || echo "")
          MACOS_ARM_SIG=$(cat artifacts/macos-arm/*.sig 2>/dev/null | head -1 || echo "")
          WINDOWS_SIG=$(cat artifacts/windows/*.sig 2>/dev/null | head -1 || echo "")
          # Linux 两架构：动态取 AppImage 实际文件名（命名含 amd64/aarch64）
          LINUX_X64_APPIMAGE=$(basename $(ls artifacts/linux-x64/*.AppImage 2>/dev/null | head -1) 2>/dev/null || echo "")
          LINUX_X64_SIG=$(cat artifacts/linux-x64/*.sig 2>/dev/null | head -1 || echo "")
          LINUX_ARM64_APPIMAGE=$(basename $(ls artifacts/linux-arm64/*.AppImage 2>/dev/null | head -1) 2>/dev/null || echo "")
          LINUX_ARM64_SIG=$(cat artifacts/linux-arm64/*.sig 2>/dev/null | head -1 || echo "")

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Release ${{ steps.version.outputs.version }}",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-x86_64": {
                "signature": "$MACOS_X64_SIG",
                "url": "$BASE_URL/Gclm-Agent-$VERSION-x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "$MACOS_ARM_SIG",
                "url": "$BASE_URL/Gclm-Agent-$VERSION-arm64.dmg"
              },
              "windows-x86_64": {
                "signature": "$WINDOWS_SIG",
                "url": "$BASE_URL/Gclm-Agent-$VERSION-x64-setup.exe"
              },
              "linux-x86_64": {
                "signature": "$LINUX_X64_SIG",
                "url": "$BASE_URL/$LINUX_X64_APPIMAGE"
              },
              "linux-aarch64": {
                "signature": "$LINUX_ARM64_SIG",
                "url": "$BASE_URL/$LINUX_ARM64_APPIMAGE"
              }
            }
          }
          EOF

      - name: Upload latest.json
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
