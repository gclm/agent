name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v0.1.0，需与源码版本一致）'
        required: true
        type: string
      draft:
        description: '创建草稿 Release（手动确认发布）'
        required: false
        type: boolean
        default: true
  repository_dispatch:
    types: [release]

concurrency:
  group: release
  cancel-in-progress: false

env:
  SOURCE_REPO: ${{ vars.SOURCE_REPO }}
  CARGO_TERM_COLOR: always
  # sparse registry 加速 crates.io 元数据拉取
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # ────────────────────────────────────────────
  # Preflight: cargo check + clippy + test on all 3 platforms.
  # 编译/质量/测试任一失败几分钟内挡掉，且三平台 matrix 能抓到单平台
  # 看不见的 cfg 分支错误（正是 build_shell_command 签名 bug 的根源）。
  # ────────────────────────────────────────────
  preflight:
    name: Preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      # 排除 gclm-desktop（Tauri GUI，需平台系统依赖）；engine crates 纯 Rust，
      # 三平台一致且覆盖 shell.rs 的 cfg 分支。clippy 不带 --all-targets，
      # 避免测试代码的 unwrap_used（engine-state lib.rs deny）噪音阻断。
      - name: cargo check
        run: cargo check --workspace --exclude gclm-desktop

      - name: cargo clippy
        run: cargo clippy --workspace --exclude gclm-desktop -- -D warnings

      - name: cargo test
        run: cargo test --workspace --exclude gclm-desktop

  # ────────────────────────────────────────────
  # macOS x64 (Intel)
  # ────────────────────────────────────────────
  build-macos-x64:
    name: macOS x64
    needs: preflight
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build macOS x64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          args: '--target x86_64-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64
          include-hidden-files: true
          path: |
            target/x86_64-apple-darwin/release/bundle/dmg/*
            target/x86_64-apple-darwin/release/bundle/macos/*

  # ───────────────────────────────────────────
  # macOS ARM (Apple Silicon)
  # ────────────────────────────────────────────
  build-macos-arm:
    name: macOS ARM
    needs: preflight
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build macOS ARM
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          args: '--target aarch64-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm
          include-hidden-files: true
          path: |
            target/aarch64-apple-darwin/release/bundle/dmg/*
            target/aarch64-apple-darwin/release/bundle/macos/*

  # ────────────────────────────────────────────
  # Windows x64
  # ────────────────────────────────────────────
  build-windows:
    name: Windows x64
    needs: preflight
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          include-hidden-files: true
          path: |
            target/release/bundle/nsis/*

  # ────────────────────────────────────────────
  # Linux x64 + ARM64 (deb + AppImage)
  # 两架构都用原生 runner（ubuntu-22.04 / ubuntu-22.04-arm）native 编译，
  # bundle 都在 target/release/bundle/，靠 artifact 名区分架构。
  # ────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.arch }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            artifact: linux-x64
          - arch: arm64
            runner: ubuntu-22.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build Linux
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          include-hidden-files: true
          path: |
            target/release/bundle/deb/*
            target/release/bundle/appimage/*

  # ────────────────────────────────────────────
  # Create Release + latest.json
  # ────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-x64, build-macos-arm, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: macos-x64
          path: artifacts/macos-x64

      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v7
        with:
          name: macos-arm
          path: artifacts/macos-arm

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: windows
          path: artifacts/windows

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: linux-x64
          path: artifacts/linux-x64

      - name: Download Linux ARM64 artifacts
        uses: actions/download-artifact@v7
        with:
          name: linux-arm64
          path: artifacts/linux-arm64

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_clean=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout source（for changelog）
        uses: actions/checkout@v7
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ steps.version.outputs.version }}
          token: ${{ secrets.PAT_REPO_ACCESS }}
          fetch-depth: 0          # generate-changelog 需要 git log 历史 + tags
          path: source            # checkout 到子目录，避免清空已 download 的 artifacts/

      - name: Generate release body & update CHANGELOG
        id: body
        working-directory: source
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # generate-changelog.sh: 基于 git log 生成段落 + 追加 CHANGELOG.md
          {
            echo "body<<CHANGELOG_EOF"
            bash scripts/generate-changelog.sh "$VERSION"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit CHANGELOG.md back to source
        working-directory: source
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md && ! git ls-files --others --exclude-standard -- CHANGELOG.md | grep -q .; then
            echo "CHANGELOG 无变化（首版或已提交），跳过 push"
          else
            git add CHANGELOG.md
            git commit -m "docs(changelog): 自动生成 $VERSION 发布记录 [skip ci]"
            git push
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Gclm Agent ${{ steps.version.outputs.version }}
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          generate_release_notes: true
          body: ${{ steps.body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets（find 递归，绕过 softprops glob 对子目录 .sig 匹配失败）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mapfile -t assets < <(find artifacts -type f \( \
            -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*-setup.exe" -o -name "*.exe.sig" \
            -o -name "*.deb" -o -name "*.AppImage" -o -name "*.AppImage.sig" \))
          echo "将上传 ${#assets[@]} 个 asset:"
          printf '  %s\n' "${assets[@]}"
          gh release upload "$VERSION" "${assets[@]}" --clobber

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version_clean }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}"

          # 动态取各平台 updater 资产的实际文件名 + 签名（命名随 productName/版本/架构变化，
          # 不能写死）。macOS updater 用 .app.tar.gz（不是 dmg）；签名 = .sig 文件首行。
          # 用 find 递归（artifact 内产物在 macos/、nsis/、appimage/ 等子目录，
          # ls 的非递归 glob 匹配不到）。
          pkg_name() { local f; f=$(find "$1" -name "$2" 2>/dev/null | head -1); [[ -f "$f" ]] && basename "$f" || echo ""; }
          sig_of()   { local f; f=$(find "$1" -name "$2" 2>/dev/null | head -1); [[ -f "$f" ]] && head -1 "$f" || echo ""; }

          macos_x64_pkg=$(pkg_name artifacts/macos-x64 "*.app.tar.gz")
          macos_x64_sig=$(sig_of   artifacts/macos-x64 "*.app.tar.gz.sig")
          macos_arm_pkg=$(pkg_name artifacts/macos-arm "*.app.tar.gz")
          macos_arm_sig=$(sig_of   artifacts/macos-arm "*.app.tar.gz.sig")
          win_pkg=$(pkg_name artifacts/windows "*-setup.exe")
          win_sig=$(sig_of   artifacts/windows "*-setup.exe.sig")
          linux_x64_pkg=$(pkg_name artifacts/linux-x64 "*.AppImage")
          linux_x64_sig=$(sig_of   artifacts/linux-x64 "*.AppImage.sig")
          linux_arm_pkg=$(pkg_name artifacts/linux-arm64 "*.AppImage")
          linux_arm_sig=$(sig_of   artifacts/linux-arm64 "*.AppImage.sig")

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Release ${{ steps.version.outputs.version }}",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-x86_64": {
                "signature": "$macos_x64_sig",
                "url": "$BASE_URL/$macos_x64_pkg"
              },
              "darwin-aarch64": {
                "signature": "$macos_arm_sig",
                "url": "$BASE_URL/$macos_arm_pkg"
              },
              "windows-x86_64": {
                "signature": "$win_sig",
                "url": "$BASE_URL/$win_pkg"
              },
              "linux-x86_64": {
                "signature": "$linux_x64_sig",
                "url": "$BASE_URL/$linux_x64_pkg"
              },
              "linux-aarch64": {
                "signature": "$linux_arm_sig",
                "url": "$BASE_URL/$linux_arm_pkg"
              }
            }
          }
          EOF

      - name: Upload latest.json
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
