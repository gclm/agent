name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v0.1.0，需与源码版本一致）'
        required: true
        type: string
      draft:
        description: '创建草稿 Release（手动确认发布）'
        required: false
        type: boolean
        default: true
  repository_dispatch:
    types: [release]

concurrency:
  group: release
  cancel-in-progress: false

env:
  SOURCE_REPO: ${{ vars.SOURCE_REPO }}
  CARGO_TERM_COLOR: always

jobs:
  # ────────────────────────────────────────────
  # macOS x64 (Intel)
  # ────────────────────────────────────────────
  build-macos-x64:
    name: macOS x64
    runs-on: macos-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build macOS x64
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          args: '--target x86_64-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: |
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.sig

  # ────────────────────────────────────────────
  # macOS ARM (Apple Silicon)
  # ────────────────────────────────────────────
  build-macos-arm:
    name: macOS ARM
    runs-on: macos-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build macOS ARM
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'
          args: '--target aarch64-apple-darwin'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.sig

  # ────────────────────────────────────────────
  # Windows x64
  # ────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.version || github.event.client_payload.tag }}
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'desktop/pnpm-lock.yaml'

      - name: Install frontend deps
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: './desktop'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/nsis/*.sig

  # ────────────────────────────────────────────
  # Create Release + latest.json
  # ────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-macos-x64, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: artifacts/macos-x64

      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm
          path: artifacts/macos-arm

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.tag }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_clean=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Gclm Agent ${{ steps.version.outputs.version }}
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/macos-x64/**/*.dmg
            artifacts/macos-x64/**/*.sig
            artifacts/macos-arm/**/*.dmg
            artifacts/macos-arm/**/*.sig
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate latest.json
        run: |
          VERSION="${{ steps.version.outputs.version_clean }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}"

          # 读取签名文件内容
          MACOS_X64_SIG=$(cat artifacts/macos-x64/*.sig 2>/dev/null | head -1 || echo "")
          MACOS_ARM_SIG=$(cat artifacts/macos-arm/*.sig 2>/dev/null | head -1 || echo "")
          WINDOWS_SIG=$(cat artifacts/windows/*.sig 2>/dev/null | head -1 || echo "")

          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "notes": "Release ${{ steps.version.outputs.version }}",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-x86_64": {
                "signature": "$MACOS_X64_SIG",
                "url": "$BASE_URL/Gclm-Agent-$VERSION-x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "$MACOS_ARM_SIG",
                "url": "$BASE_URL/Gclm-Agent-$VERSION-arm64.dmg"
              },
              "windows-x86_64": {
                "signature": "$WINDOWS_SIG",
                "url": "$BASE_URL/Gclm-Agent-$VERSION-x64-setup.exe"
              }
            }
          }
          EOF

      - name: Upload latest.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
