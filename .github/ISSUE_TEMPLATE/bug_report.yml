name: Bug 报告
description: 报告应用崩溃、功能异常等问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请填写以下信息帮助我们定位问题。
  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 在"关于"面板查看版本号
      placeholder: 如 0.0.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      description: 你使用的操作系统
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个问题？请详细描述操作步骤
      placeholder: |
        1. 打开应用
        2. 点击某个功能
        3. 出现错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？如果有错误信息，请粘贴完整错误内容
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、日志、或其他有助于定位问题的信息
    validations:
      required: false
