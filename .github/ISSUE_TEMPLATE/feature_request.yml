name: 功能建议
description: 建议新功能或改进现有功能
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你的使用场景和期望的解决方案。
  - type: textarea
    id: problem
    attributes:
      label: 你的使用场景
      description: 你希望在什么场景下使用这个功能？描述你遇到的问题或需求
      placeholder: 当我使用 xxx 功能时，我经常遇到 xxx 问题...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望这个功能如何实现？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      description: 你是否考虑过其他替代方案？
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、Mockup、或其他有助于理解的信息
    validations:
      required: false
